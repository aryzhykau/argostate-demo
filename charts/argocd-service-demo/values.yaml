replicaCount: 1

image:
  repository: argocd-service-demo
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  host: argocd-service-demo.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  APP_VERSION: "0.1.0"

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false

metrics:
  enabled: true
  port: "8080"
  path: /metrics

keda:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  lagThreshold: "10"
  kafka:
    brokers: ""
    topic: ""
    consumerGroup: ""
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
