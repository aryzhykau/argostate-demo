replicaCount: 1

image:
  repository: ghcr.io/aryzhykau/argocd-service-demo
  pullPolicy: IfNotPresent
  tag: "latest"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  host: argocd-service-demo.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

env:
  APP_VERSION: "0.1.0"

autoscaling:
  enabled: false
